name: CI-DevSecOps

on:
  push:
    branches:
      - main
      - dev
      - feat-*
      - feature/*

    paths-ignore:
      - "k8s/**"
      - "docs/**"
      - "**/*.md"

env:
  DOCKER_BUILDKIT: 1

jobs:

  # SECURITY STAGE (SAST + SECRETS + SCA)
  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Secret Scanning
      - name: Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2

      # SAST Scan (multi-language)
      - name: Semgrep SAST Scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: "p/ci"
        continue-on-error: false

      # Setup Go (FIXED VERSION)
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      # Go Dependency + Vuln Scan (SCA)
      - name: Run Go Security Scan (govulncheck)
        working-directory: ./backend
        run: |
          go mod tidy
          go mod download
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...



  # BACKEND BUILD + SCAN
  backend:
    needs: security
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build + Push Backend
      - name: Build and Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Trivy Scan Backend Image
      - name: Trivy Scan Backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-backend:latest
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true



  # FRONTEND BUILD + SCAN
  frontend:
    needs: security
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build + Push Frontend
      - name: Build and Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Trivy Scan Frontend Image
      - name: Trivy Scan Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-frontend:latest
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true
          