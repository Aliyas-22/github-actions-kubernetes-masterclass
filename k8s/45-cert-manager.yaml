# ─────────────────────────────────────────────────────────────────
# ClusterIssuer — Let's Encrypt production certificates
# cert-manager uses this to get HTTPS certs automatically
# Replace email with your actual email
# ─────────────────────────────────────────────────────────────────
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: aliyafirdous@example.com    # replace with your email
    privateKeySecretRef:
      name: letsencrypt-account-key
    solvers:
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - group: gateway.networking.k8s.io
                kind: Gateway
                name: skillpulse-gateway
                namespace: skillpulse