# ─────────────────────────────────────────────────────────────────
# StorageClass — EBS gp3 dynamic provisioning
# EKS EBS CSI driver creates EBS volumes automatically
# WaitForFirstConsumer = volume created in same AZ as pod
# No need to create PV manually — dynamic provisioning does it
# ─────────────────────────────────────────────────────────────────
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: gp3
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: ebs.csi.aws.com
volumeBindingMode: WaitForFirstConsumer   # creates EBS in same AZ as pod
reclaimPolicy: Retain                     # EBS volume survives PVC deletion
allowVolumeExpansion: true                # can grow volume later
parameters:
  type: gp3
  fsType: ext4
  encrypted: "true"                       # EBS encryption at rest

---
# ─────────────────────────────────────────────────────────────────
# PVC — MySQL persistent storage (5Gi EBS gp3)
# When mysql pod starts, EBS CSI driver creates a real AWS EBS
# volume and attaches it to the node automatically
# ReadWriteOnce = only one node can mount (correct for MySQL)
# ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: skillpulse
  labels:
    app: mysql
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: gp3
  resources:
    requests:
      storage: 5Gi